name: baby_guard
description: BabyGuard - cross-platform baby monitor (Flutter + Firebase).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Real-time dB measurement
  noise_meter: ^5.0.2

  # Background execution
  flutter_foreground_task: ^8.10.0
  flutter_background_service: ^5.0.10

  # Notifications + alarm (uses system default alarm ringtone)
  awesome_notifications: ^0.10.0

  # Persistence
  shared_preferences: ^2.3.2

  # State management
  flutter_riverpod: ^2.5.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Pairing
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # OS integration
  permission_handler: ^11.3.1
  vibration: ^2.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#E8F4FA"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 23
